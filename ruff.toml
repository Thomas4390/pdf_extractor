line-length = 120
target-version = "py311"

[lint]
select = ["E", "W", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line-too-long (géré par line-length du formatter)
    "E402",   # module-import-not-at-top (nécessaire pour sys.path et imports conditionnels Streamlit)
    "UP045",  # Optional[X] → X | None (garde compatibilité 3.9 si nécessaire)
]

[lint.per-file-ignores]
"src/tests/**" = ["F841"]  # variables inutilisées OK dans les tests
