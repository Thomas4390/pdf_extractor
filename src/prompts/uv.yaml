# UV Assurance extraction prompts
document_type: UV

system_prompt: |
  Expert extracteur de données PDF d'assurance UV Assurance.

  RÈGLES:
  - Extrais EXACTEMENT ce qui est écrit
  - Montants = nombres décimaux (1234.56)
  - Dates = YYYY-MM-DD
  - Taux = pourcentages simples (100 dans PDF → 100.0, PAS 100000)
  - Préserve l'orthographe exacte des noms

  Retourne un JSON valide.

user_prompt: |
  Extrais TOUTES les données de ce rapport UV Assurance.

  ## MÉTADONNÉES (PAGE 1 UNIQUEMENT, sous le titre "RAPPORT DE RÉMUNÉRATION")

  ATTENTION: Ces champs se trouvent UNIQUEMENT en haut de la première page,
  juste sous le titre "RAPPORT DE RÉMUNÉRATION DU ...".
  NE PAS confondre avec "Montant net versé à ..." qui apparaît en page 2.

  - date_rapport: Date après "RAPPORT DE RÉMUNÉRATION DU" (YYYY-MM-DD)
  - nom_conseiller: Texte après "Nom du conseiller :" sur la première page.
    Peut être un nom de personne (ex: "ACHRAF EL HAJJI") OU un numéro d'entreprise (ex: "9491-1377 QUEBEC INC").
  - numero_conseiller: Texte après "Numéro du conseiller :" sur la première page (ex: "21621" ou "21622")

  ## ACTIVITÉS (tableau)

  STRUCTURE: Le PDF peut contenir PLUSIEURS tableaux.

  SOUS-CONSEILLER: Certains rapports ont une ligne "NUMÉRO - NOM" (ex: "21622 - ACHRAF EL HAJJI")
  au-dessus du tableau d'activités. Cette ligne est le sous-conseiller.
  - Si cette ligne existe au-dessus du tableau → sous_conseiller = "NUMÉRO - NOM"
  - Si le tableau commence DIRECTEMENT par les en-têtes "Contrat | Assuré(s) | Protection..."
    SANS ligne "NUMÉRO - NOM" au-dessus → sous_conseiller = null

  Pour CHAQUE ligne, extrais:
  | Champ | Description | Exemple |
  |-------|-------------|---------|
  | sous_conseiller | Format "NUMÉRO - NOM" au-dessus du tableau, ou null si absent | "21622 - ACHRAF EL HAJJI" |
  | contrat | Numéro contrat | "110970886" |
  | assure | Nom assuré | "BALDWIN RAYMOND" |
  | protection | Type protection | "Vie entière Valeurs Élevées" |
  | montant_base | Montant base (décimal) | 1196.00 |
  | taux_partage | % partage (100→100.0, PAS 100000!) | 100.0 |
  | taux_commission | % commission | 55.0 |
  | resultat | Montant résultat (décimal) | 657.80 |
  | type_commission | Type commission | "Boni 1ère année vie" |
  | taux_boni | % boni | 175.0 |
  | remuneration | Montant final (décimal) | 1151.15 |

  ## IMPORTANT
  - Extrais TOUTES les lignes de TOUS les tableaux
  - Taux = pourcentages simples: "100" → 100.0 (JAMAIS 100000)
  - Montants = nombres décimaux
  - nom_conseiller et numero_conseiller viennent UNIQUEMENT de la page 1

  ## JSON OUTPUT
  ```json
  {
    "document_type": "UV",
    "date_rapport": "YYYY-MM-DD",
    "nom_conseiller": "...",
    "numero_conseiller": "...",
    "activites": [
      {
        "sous_conseiller": "21622 - ACHRAF EL HAJJI",
        "contrat": "110970886",
        "assure": "NOM PRENOM",
        "protection": "...",
        "montant_base": 1196.00,
        "taux_partage": 40.0,
        "taux_commission": 55.0,
        "resultat": 657.80,
        "type_commission": "Boni 1ère année vie",
        "taux_boni": 175.0,
        "remuneration": 1151.15
      }
    ]
  }
  ```
